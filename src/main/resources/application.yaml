# Setup for Spring Boot application with PostgreSQL database connection and JPA configuration.
spring:
  config:
    import: optional:file:.env[.properties]
  mail:
    host: sandbox.smtp.mailtrap.io
    port: 2525
    username: 1c19e3872d228b
    password: d1deca1e52d104
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  application:
    name: find_me_a_doc_backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/findmeadoc}
    username: ${SPRING_DATASOURCE_USERNAME:findmeadoc_user}
    password: ${SPRING_DATASOURCE_PASSWORD:iit@9009}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3.2:3b
          num-predict: -1
          temperature: 0.2
          num-thread: 8
          keep-alive: 10m

  cache:
    type: redis

  data:
    redis:
      host: localhost
      port: 6379

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}