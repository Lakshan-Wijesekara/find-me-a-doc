# Setup for Spring Boot application with PostgreSQL database connection and JPA configuration.
spring:
  application:
    name: find_me_a_doc_backend

  datasource:
    url: jdbc:postgresql://localhost:5433/findmeadoc
    username: findmeadoc_user
    password: iit@9009
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect