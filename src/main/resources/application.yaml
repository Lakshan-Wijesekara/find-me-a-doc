# Setup for Spring Boot application with PostgreSQL database connection and JPA configuration.
spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: find_me_a_doc_backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/findmeadoc}
    username: ${SPRING_DATASOURCE_USERNAME:findmeadoc_user}
    password: ${SPRING_DATASOURCE_PASSWORD:iit@9009}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3:latest
          num-predict: 2000
          temperature: 0.2
          num-thread: 8
          keep-alive: 10m

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}